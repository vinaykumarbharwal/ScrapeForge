version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: scrapeforge-postgres-prod
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: scrapeforge
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d scrapeforge"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: scrapeforge-redis-prod
    restart: always
    volumes:
      - redisdata_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-01-28T22-35-50Z
    container_name: scrapeforge-minio-prod
    restart: always
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadminpassword
    command: server /data --console-address ":9001"
    volumes:
      - miniodata_prod:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: scrapeforge-api-prod
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgrespassword@postgres:5432/scrapeforge
      - REDIS_URL=redis://redis:6379
      - MINIO_ENDPOINT=minio:9000

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: scrapeforge-worker-prod
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgrespassword@postgres:5432/scrapeforge
      - REDIS_URL=redis://redis:6379
      - MINIO_ENDPOINT=minio:9000

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: scrapeforge-frontend-prod
    restart: always
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  pgdata_prod:
  redisdata_prod:
  miniodata_prod:
